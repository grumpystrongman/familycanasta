name: Sonar diagnostic

on:
  push:
    branches:
      - agent/add-hand-autosort

jobs:
  report-sonar-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Sonar reliability issues for PR 25
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --get \
            --data-urlencode 'componentKeys=grumpystrongman_familycanasta' \
            --data-urlencode 'pullRequest=25' \
            --data-urlencode 'resolved=false' \
            --data-urlencode 'types=BUG' \
            --data-urlencode 'ps=100' \
            'https://sonarcloud.io/api/issues/search' \
            | jq '{total, issues: [.issues[] | {rule, severity, type, message, component, line, textRange}]}'
