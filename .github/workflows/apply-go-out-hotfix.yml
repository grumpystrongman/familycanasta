name: Apply go-out approval hotfix

on:
  push:
    branches:
      - agent/fix-go-out-approval-guard

permissions:
  contents: write

jobs:
  patch-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4

      - name: Guard missing go-out request
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/App.jsx")
          source = path.read_text()
          old = '  const myGoOutApproved = Boolean(goOutRequest?.uid === me?.uid && (goOutRequest.approvedBy || []).length);'
          new = '  const myGoOutApproved = Boolean(goOutRequest && goOutRequest.uid === me?.uid && (goOutRequest.approvedBy || []).length);'
          count = source.count(old)
          if count != 1:
              raise SystemExit(f"Expected exactly one vulnerable expression, found {count}")
          path.write_text(source.replace(old, new))
          PY

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Run tests
        run: npm test

      - name: Build production bundle
        run: npm run build

      - name: Commit the validated fix
        run: |
          rm .github/workflows/apply-go-out-hotfix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.jsx .github/workflows/apply-go-out-hotfix.yml
          git commit -m "fix: guard missing go-out approval request"
          git push origin HEAD:agent/fix-go-out-approval-guard
